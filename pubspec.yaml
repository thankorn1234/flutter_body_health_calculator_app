name: flutter_body_health_calculator_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2           # รวมฟอนต์จาก fonts.google.com เพื่อมาใช้ในโปรเจกต์
  font_awesome_flutter: ^11.0.0  # รวมฟอนต์จาก fontawesome.com เพื่อมาใช้ในโปรเจกต์

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true 
  assets:
    - assets/images/